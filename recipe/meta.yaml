{% set name = "dlux" %}
{% set version = "0.14.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2d6f209768133bea77bbc86ec7bb9464817f00e28ff08adb3d1d009269d0ab72

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - jax
    - jaxlib
    - zodiax >=0.4.1

test:
  imports:
    - dLux
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://louisdesdoigts.github.io/dLux/
  summary: Differentiable Optical Models as Parameterised Neural Networks in Jax using Zodiax.
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - LouisDesdoigts
    - christhechris
